app:
  name: "Plotra Platform"
  version: "1.0.0"
  debug: true
  env: "development"
  secret_key: "development-key-change-in-production"
  algorithm: "HS256"
  access_token_expire_minutes: 30
  frontend_url: "http://dev.plotra.eu"

database:
  host: postgres
  port: 5432
  username: postgres
  password: postgres
  name: plotra_db
  pool_size: 10
  max_overflow: 20
  async_mode: true

redis:
  host: localhost
  port: 6379
  db: 0

postgis:
  enabled: true
  srid: 4326

satellite:
  provider: "sentinel_hub"
  api_key: ""
  base_url: "https://services.sentinel-hub.com"
  simulation_mode: true
  ndvi_threshold: 0.65
  deforestation_baseline_year: 2014
  biomass_threshold: 100

eudr:
  compliance_status: "Under Review"
  certificate_validity_days: 365
  dds_version: "1.0"
  portal_url: "https://eudr-portal.example.com"

geospatial:
  gps_accuracy_threshold_meters: 10
  min_polygon_area_hectares: 0.1
  max_farm_polygons_per_farmer: 10
  parent_child_validation: true
  boundary_overlap_tolerance: 0.01

storage:
  documents_path: "./uploads/documents"
  certificates_path: "./uploads/certificates"
  photos_path: "./uploads/photos"
  s3_bucket: "plotra-uploads"
  s3_endpoint: ""
  s3_access_key: ""
  s3_secret_key: ""
  s3_region: "af-south-1"

celery:
  broker_url: "redis://localhost:6379/1"
  result_backend: "redis://localhost:6379/2"

cors:
  allowed_origins:
    - "http://localhost:3000"
    - "http://localhost:8080"
    - "http://127.0.0.1:8080"
    - "http://188.166.28.64"
    - "http://188.166.28.64:8080"
    - "http://dev.plotra.eu"
    - "https://dev.plotra.eu"
  allow_credentials: true

payments:
  enabled: false
  mpesa_consumer_key: ""
  mpesa_consumer_secret: ""
  mpesa_shortcode: ""
  escrow_enabled: true

verification:
  require_all_fields: false
  auto_submit_eudr: false
  alert_threshold_days: 30

logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: "logs/plotra.log"
  audit_enabled: true

sms:
  provider: "africastalking"
  api_key: "test_key"
  api_secret: "test_secret"
  username: "test_user"
  sender_id: "PLOTRA"
  debug_mode: true
