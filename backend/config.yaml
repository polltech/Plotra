# Plotra Platform Configuration
# Environment-based configuration loader

app:
  name: "Plotra Platform"
  version: "1.0.0"
  debug: true
  env: "development"
  secret_key: "${KIPAWA_SECRET_KEY:-change-me-in-production}"
  algorithm: "HS256"
  access_token_expire_minutes: 30

database:
  host: "${KIPAWA_DB_HOST:-localhost}"
  port: 5432
  username: "${KIPAWA_DB_USER:-postgres}"
  password: "${KIPAWA_DB_PASSWORD:-postgres}"
  name: "${KIPAWA_DB_NAME:-plotra_db}"
  pool_size: 10
  max_overflow: 20
  async_mode: true

redis:
  host: "${KIPAWA_REDIS_HOST:-localhost}"
  port: 6379
  db: 0

postgis:
  enabled: true
  srid: 4326  # WGS84

satellite:
  provider: "sentinel_hub"
  api_key: "${SENTINEL_API_KEY:-}"
  base_url: "https://services.sentinel-hub.com"
  simulation_mode: "${SENTINEL_SIMULATION_MODE:-true}"
  ndvi_threshold: 0.65
  deforestation_baseline_year: 2014  # 10-year lookback
  biomass_threshold: 100  # tons/hectare

eudr:
  compliance_status: "Under Review"
  certificate_validity_days: 365
  dds_version: "1.0"
  portal_url: "${EUDR_PORTAL_URL:-https://eudr-portal.example.com}"

geospatial:
  gps_accuracy_threshold_meters: 10
  min_polygon_area_hectares: 0.1
  max_farm_polygons_per_farmer: 10
  parent_child_validation: true
  boundary_overlap_tolerance: 0.01  # 1% overlap tolerance

storage:
  documents_path: "./uploads/documents"
  certificates_path: "./uploads/certificates"
  photos_path: "./uploads/photos"
  s3_bucket: "${KIPAWA_S3_BUCKET:-plotra-uploads}"
  s3_endpoint: "${KIPAWA_S3_ENDPOINT:-}"
  s3_access_key: "${KIPAWA_S3_ACCESS_KEY:-}"
  s3_secret_key: "${KIPAWA_S3_SECRET_KEY:-}"
  s3_region: "${KIPAWA_S3_REGION:-af-south-1}"

celery:
  broker_url: "redis://${KIPAWA_REDIS_HOST:-localhost}:6379/1"
  result_backend: "redis://${KIPAWA_REDIS_HOST:-localhost}:6379/2"

cors:
  allowed_origins:
    - "http://localhost:3000"
    - "http://localhost:8080"
    - "http://127.0.0.1:8080"
    - "http://localhost:8081"
    - "http://127.0.0.1:8081"
    - "http://localhost:8000"
    - "http://127.0.0.1:8000"
  allow_credentials: true

payments:
  enabled: false  # Future feature
  mpesa_consumer_key: "${M_PESA_CONSUMER_KEY:-}"
  mpesa_consumer_secret: "${M_PESA_CONSUMER_SECRET:-}"
  mpesa_shortcode: "${M_PESA_SHORTCODE:-}"
  escrow_enabled: true

verification:
  require_all_fields: false
  auto_submit_eudr: false
  alert_threshold_days: 30

logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: "logs/plotra.log"
  audit_enabled: true

sms:
  provider: "africastalking"
  api_key: "7edd2b22cd9c1d9ffc08a34681c532b27b82500d9401b73ebb65f0e3c6264a81"
  api_secret: "e5b1c8a9c3f1d2e4b5a6c7d8e9f0a1b2c3d4e5f6a7b8c9d0e1f2g3h4i5j6k7l8m9n0"
