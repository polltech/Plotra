version: '3.8'

services:
  postgres:
    image: postgis/postgis:15-3.3
    container_name: plotra-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: plotra_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d plotra_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: plotra-backend
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/plotra_db
      - KIPAWA_DB_HOST=postgres
      - KIPAWA_DB_PORT=5432
      - KIPAWA_DB_USER=postgres
      - KIPAWA_DB_PASSWORD=postgres
      - KIPAWA_DB_NAME=plotra_db
      - KIPAWA_SECRET_KEY=development-key-change-in-production
      - KIPAWA_DEBUG=true
      - KIPAWA_ENV=development
      - KIPAWA_CORS__ALLOWED_ORIGINS=["http://localhost:3000","http://localhost:8080","http://dev.plotra.eu","https://dev.plotra.eu"]
      - KIPAWA_CORS__ALLOW_CREDENTIALS=true
      - PYTHONPATH=/app
    ports:
      - "8000:8000"
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    command: sh -c "sleep 5 && python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  dashboard:
    image: nginx:alpine
    container_name: plotra-dashboard
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./frontend/dashboard:/usr/share/nginx/html:rw
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  uploads_data:
